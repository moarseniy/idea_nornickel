services:
  hypothesis-lab:
    build: .
    ports:
      - "8080:8080"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--log-level", "${UVICORN_LOG_LEVEL:-info}"]
    environment:
      APP_NAME: ${APP_NAME:-Hypothesis Lab}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_GRAPH_EXTRACTION: ${OPENAI_GRAPH_EXTRACTION:-true}
      OPENAI_RESEARCH_MODEL: ${OPENAI_RESEARCH_MODEL:-}
      OPENAI_RESEARCH_MAX_SOURCES: ${OPENAI_RESEARCH_MAX_SOURCES:-8}
      OPENAI_VISION_DETAIL: ${OPENAI_VISION_DETAIL:-high}
      STORAGE_DIR: /app/storage
      DATABASE_PATH: /app/storage/hypothesis_lab.db
      UPLOADS_DIR: /app/storage/uploads
      SAMPLE_DATA_DIR: /app/data
      MAX_DOCUMENT_CHARS: ${MAX_DOCUMENT_CHARS:-120000}
      MAX_CONTEXT_CHARS: ${MAX_CONTEXT_CHARS:-28000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-36700160}
      PDF_OCR_ENABLED: ${PDF_OCR_ENABLED:-true}
      PDF_OCR_LANGUAGES: ${PDF_OCR_LANGUAGES:-ru,en,ch_sim}
      PDF_OCR_MODEL_DIR: /app/storage/easyocr
      PDF_OCR_MIN_CHARS: ${PDF_OCR_MIN_CHARS:-12}
      PDF_TEXT_LAYER_MIN_CHARS: ${PDF_TEXT_LAYER_MIN_CHARS:-16}
      PDF_RENDER_DPI: ${PDF_RENDER_DPI:-160}
      PDF_VISION_MAX_PAGES: ${PDF_VISION_MAX_PAGES:-8}
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
